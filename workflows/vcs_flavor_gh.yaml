---
workflows:
  hdci/load_cfg_gh:
    context: _hdci_schema
    with:
      hooks:
        on_exit: hdci/report_yml_error
    no_export:
      - file_content
      - preliminary_hdci_cfg
      - root_hdci_cfg
    steps:
      - call_workflow: github_getContent
        with:
          path: '.hdci.yml'
          github_system: $ctx.gh_system
          tokenSourceParams:
            installation_id: $ctx.gh_installation_id
        export:
          preliminary_hdci_cfg: :yaml_safe:{{ .ctx.file_content }}
          schema_error: '{{ with (cue_validate_error .ctx.hdci_file_schema ".hdci.yml" .ctx.file_content) }}{{ fail . }}{{ end }}'
          root_hdci_cfg: $?ctx.file_content
        no_export:
          - file_content
      - unless:
          - $?ctx.schema_error
        iterate: $?ctx.preliminary_hdci_cfg.use_templates
        steps:
          - call_workflow: github_getContent
            with:
              github_system: $ctx.hdci.gh_system_pat
              path: '{{ if typeIs "string" .ctx.current }}{{ .ctx.current }}{{ else }}{{ .ctx.current.file }}{{ end }}'
              github_pats:
                - '{{ if not (typeIs "string" .ctx.current) }}lookup:{{ .ctx.hdci.sec_driver }},?/secrets/data/hdci/gh/{{ .ctx.git_repo }}#{{ .ctx.current.github_pat_secret }}{{ end }}'
                - '{{ if not (typeIs "string" .ctx.current) }}lookup:{{ .ctx.hdci.sec_driver }},?/secrets/data/hdci/gh/{{ dir .ctx.git_repo }}/_org#{{ .ctx.current.github_pat_secret }}{{ end }}'
                - 'lookup:{{ .ctx.hdci.sec_driver }},?/secrets/data/hdci/gh/{{ .ctx.git_repo }}#github_pat'
                - 'lookup:{{ .ctx.hdci.sec_driver }},/secrets/data/hdci/gh/{{ dir .ctx.git_repo }}/_org#github_pat'
            export:
              hdci_cfg: :yaml_safe:{{ .ctx.file_content }}
              schema_error: '{{ with (cue_validate_error .ctx.hdci_file_schema .ctx.current .ctx.file_content) }}{{ fail . }}{{ end }}'
            no_export:
              - file_content
          - export:
              hdci_cfg: :yaml_safe:{{ .ctx.root_hdci_cfg }}
        description: merging hdci config templates

  hdci/report_yml_error_gh:
    call_function: '{{ .ctx.gh_system }}.createStatus'
    with:
      tokenSourceParams:
        installation_id: $ctx.hdci.gh_installation_ids.{{ dir .ctx.git_repo | lower }},ctx.gh_installation_id
      context: hdci/cfg
      status:
        state: '{{ eq .labels.status "success" | ternary "success" "error" }}'
        description: '{{ eq .labels.status "success" | ternary ".hdci.yml is valid" "missing or invalid .hdci.yml" }}'

  hdci/announce_stage_gh:
    call_function: '{{ .ctx.gh_system }}.createStatus'
    with:
      tokenSourceParams:
        installation_id: $ctx.hdci.gh_installation_ids.{{ dir .ctx.git_repo | lower }},ctx.gh_installation_id
      context: hdci/{{ .ctx.stage_name }}
      status:
        state: pending
        description: $ctx.stage.gh_status_message.pending,"pipeline is running..."
        target_url: '{{ with .ctx._log_stream }}{{ $.ctx.hdci.ui_url }}/logs/{{ .provider }}/{{ .pod_id }}?gh={{ urlquery .gh_slug }}&stream_token={{ urlquery .stream_token }}{{ with .provider_data }}&provider_data={{ . | toJson | urlquery }}{{ end }}{{ end }}'

  hdci/report_stage_result_gh:
    call_function: '{{ .ctx.gh_system }}.createStatus'
    with:
      tokenSourceParams:
        installation_id: $ctx.hdci.gh_installation_ids.{{ dir .ctx.git_repo | lower }},ctx.gh_installation_id
      context: hdci/{{ .ctx.stage_name }}
      status:
        state: $ctx.job_status,labels.status
        description: $ctx.stage.gh_status_message.{{ coalesce .ctx.job_status .labels.status }},"pipeline is completed with status {{ coalesce .ctx.job_status .labels.status }}."
        target_url: '{{ with .ctx._log_stream }}{{ $.ctx.hdci.ui_url }}/logs/{{ .provider }}/{{ .pod_id }}?gh={{ urlquery .gh_slug }}&stream_token={{ urlquery .stream_token }}{{ with .provider_data }}&provider_data={{ . | toJson | urlquery }}{{ end }}{{ end }}'
