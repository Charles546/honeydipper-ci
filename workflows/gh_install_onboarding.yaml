---
workflows:
  hdci/gh_app_installation_onboarding:
    no_export:
      - file_content
      - git_commit_info
    with:
      onboarding_target_repo: $ctx.hdci.gh_install_onboarding.target_repo
      onboarding_base_branch: $ctx.hdci.gh_install_onboarding.base_branch
      onboarding_layer_dir: $ctx.hdci.gh_install_onboarding.layer_dir
      onboarding_gh_system: $ctx.hdci.gh_system_pat
    steps:
      - export:
          onboarding_account: '{{ lower (trim (default "" .ctx.gh_installation_account)) }}'
          onboarding_account_type: '{{ lower (trim (default "" .ctx.gh_installation_account_type)) }}'
          onboarding_kind: '{{ eq (lower (trim (default "" .ctx.gh_installation_account_type))) "organization" | ternary "org" "user" }}'
          onboarding_branch: >-
            hdci/onboard-auth-{{ eq (lower (trim (default "" .ctx.gh_installation_account_type))) "organization" | ternary "org" "user" }}-
            {{ replace "/" "-" (replace "." "-" (replace "_" "-" (lower (trim (default "" .ctx.gh_installation_account))))) }}-
            {{ default "0" .ctx.gh_installation_id }}
          onboarding_file: >-
            {{ .ctx.onboarding_layer_dir }}/
            {{ eq (lower (trim (default "" .ctx.gh_installation_account_type))) "organization" | ternary "org" "user" }}-
            {{ replace "/" "-" (replace "." "-" (replace "_" "-" (lower (trim (default "" .ctx.gh_installation_account))))) }}.yaml
          onboarding_commit_message: >-
            chore(auth-github): onboard
            {{ eq (lower (trim (default "" .ctx.gh_installation_account_type))) "organization" | ternary "org" "user" }}
            {{ lower (trim (default "" .ctx.gh_installation_account)) }}
          onboarding_pr_title: >-
            chore(auth-github): onboard
            {{ eq (lower (trim (default "" .ctx.gh_installation_account_type))) "organization" | ternary "org" "user" }}
            {{ lower (trim (default "" .ctx.gh_installation_account)) }}
          onboarding_file_content: |-
            ---
            drivers:
              auth-github:
                {{ if eq (lower (trim (default "" .ctx.gh_installation_account_type))) "organization" }}allowed_orgs{{ else }}allowed_users{{ end }}:
                  - {{ lower (trim (default "" .ctx.gh_installation_account)) }}
            contexts:
              _hdci:
                "*":
                  hdci:
                    gh_installation_ids:
                      '{{ lower (trim (default "" .ctx.gh_installation_account)) }}': '{{ default "" .ctx.gh_installation_id }}'
          onboarding_pr_body: |-
            This PR was created automatically after a GitHub App installation event.

            Event details:
            - event: {{ .ctx.gh_event }}
            - action: {{ .ctx.gh_action }}
            - installation_id: {{ default "" .ctx.gh_installation_id }}
            - installation_account: {{ .ctx.gh_installation_account }}
            - installation_account_type: {{ .ctx.gh_installation_account_type }}
            - sender: {{ default "" .ctx.gh_sender }}

            Proposed change:
            - add {{ lower (trim (default "" .ctx.gh_installation_account)) }} to {{ if eq (lower (trim (default "" .ctx.gh_installation_account_type))) "organization" }}drivers.auth-github.allowed_orgs{{ else }}drivers.auth-github.allowed_users{{ end }} via {{ .ctx.onboarding_file }}
            - set contexts._hdci."*".hdci.gh_installation_ids.{{ lower (trim (default "" .ctx.gh_installation_account)) }}={{ .ctx.gh_installation_id }} via {{ .ctx.onboarding_file }}

            Notes:
            - target repo: {{ .ctx.onboarding_target_repo }}
            - base branch: {{ .ctx.onboarding_base_branch }}
      - on_error: continue
        call_function: '{{ .ctx.onboarding_gh_system }}.api'
        with:
          resource_path: 'repos/{{ .ctx.onboarding_target_repo }}/contents/{{ .ctx.onboarding_file }}?ref={{ .ctx.onboarding_base_branch }}'
        export_on_success:
          onboarding_file_exists: true
        export_on_error:
          onboarding_file_exists: false
      - unless:
          - '{{ .ctx.onboarding_file_exists }}'
        steps:
          - call_workflow: hdci/github_create_pr_from_files
            with:
              github_system: $ctx.onboarding_gh_system
              git_repo: $ctx.onboarding_target_repo
              git_ref: refs/heads/{{ .ctx.onboarding_base_branch }}
              branch_name: $ctx.onboarding_branch
              files:
                - path: $ctx.onboarding_file
                  content: $ctx.onboarding_file_content
              commit_message: $ctx.onboarding_commit_message
              pr_title: $ctx.onboarding_pr_title
              pr_body: $ctx.onboarding_pr_body

  hdci/gh_app_installation_offboarding:
    with:
      onboarding_target_repo: $ctx.hdci.gh_install_onboarding.target_repo
      onboarding_base_branch: $ctx.hdci.gh_install_onboarding.base_branch
      onboarding_layer_dir: $ctx.hdci.gh_install_onboarding.layer_dir
      onboarding_gh_system: $ctx.hdci.gh_system_pat
    steps:
      - export:
          onboarding_account: '{{ lower (trim (default "" .ctx.gh_installation_account)) }}'
          onboarding_account_type: '{{ lower (trim (default "" .ctx.gh_installation_account_type)) }}'
          onboarding_kind: '{{ eq (lower (trim (default "" .ctx.gh_installation_account_type))) "organization" | ternary "org" "user" }}'
          onboarding_branch: >-
            hdci/offboard-auth-{{ eq (lower (trim (default "" .ctx.gh_installation_account_type))) "organization" | ternary "org" "user" }}-
            {{ replace "/" "-" (replace "." "-" (replace "_" "-" (lower (trim (default "" .ctx.gh_installation_account))))) }}-
            {{ default "0" .ctx.gh_installation_id }}
          onboarding_file: >-
            {{ .ctx.onboarding_layer_dir }}/
            {{ eq (lower (trim (default "" .ctx.gh_installation_account_type))) "organization" | ternary "org" "user" }}-
            {{ replace "/" "-" (replace "." "-" (replace "_" "-" (lower (trim (default "" .ctx.gh_installation_account))))) }}.yaml
          onboarding_commit_message: >-
            chore(auth-github): offboard
            {{ eq (lower (trim (default "" .ctx.gh_installation_account_type))) "organization" | ternary "org" "user" }}
            {{ lower (trim (default "" .ctx.gh_installation_account)) }}
          onboarding_pr_title: >-
            chore(auth-github): offboard
            {{ eq (lower (trim (default "" .ctx.gh_installation_account_type))) "organization" | ternary "org" "user" }}
            {{ lower (trim (default "" .ctx.gh_installation_account)) }}
          onboarding_pr_body: |-
            This PR was created automatically after a GitHub App installation removal event.

            Event details:
            - event: {{ .ctx.gh_event }}
            - action: {{ .ctx.gh_action }}
            - installation_id: {{ default "" .ctx.gh_installation_id }}
            - installation_account: {{ .ctx.gh_installation_account }}
            - installation_account_type: {{ .ctx.gh_installation_account_type }}
            - sender: {{ default "" .ctx.gh_sender }}

            Proposed change:
            - remove generated file {{ .ctx.onboarding_file }}

            Notes:
            - target repo: {{ .ctx.onboarding_target_repo }}
            - base branch: {{ .ctx.onboarding_base_branch }}
      - on_error: continue
        call_function: '{{ .ctx.onboarding_gh_system }}.api'
        with:
          resource_path: 'repos/{{ .ctx.onboarding_target_repo }}/contents/{{ .ctx.onboarding_file }}?ref={{ .ctx.onboarding_base_branch }}'
        export_on_success:
          onboarding_file_exists: true
        export_on_error:
          onboarding_file_exists: false
      - if:
          - '{{ .ctx.onboarding_file_exists }}'
        steps:
          - call_workflow: hdci/github_create_pr_from_files
            with:
              github_system: $ctx.onboarding_gh_system
              git_repo: $ctx.onboarding_target_repo
              git_ref: refs/heads/{{ .ctx.onboarding_base_branch }}
              branch_name: $ctx.onboarding_branch
              files:
                - path: $ctx.onboarding_file
                  action: delete
              commit_message: $ctx.onboarding_commit_message
              pr_title: $ctx.onboarding_pr_title
              pr_body: $ctx.onboarding_pr_body
