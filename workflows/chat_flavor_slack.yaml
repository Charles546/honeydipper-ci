---
workflows:
  hdci/report_yml_error_slack:
    call_workflow: notify
    with:
      - notify: $?ctx.hdci.slack_notify
      - notify+: $?ctx.merged_hdci_cfg.slack_notify,ctx.hdci_cfg.slack_notify
        message_type: error
        message: |
          failed to load .hdci.yml `{{ .ctx.git_repo }}`{{ with .ctx.git_ref }} `{{ . }}`{{ end }}
          {{- with .labels.reason }}
          reason:
          ```
          {{ . }}
          ```
          {{- end -}}

  hdci/announce_script_slack:
    call_workflow: notify
    context: slack_colors
    with:
      - notify: $?ctx.hdci.slack_notify
      - notify+: $?ctx.merged_hdci_cfg.slack_notify,ctx.hdci_cfg.slack_notify
        update: true
        attachments+:
          - color: $ctx.chat_colors.normal,""
            text: 'Script{{ with (coalesce .ctx.script.script_name .ctx.script.name) }} {{ . }}{{ end }}: running'

  hdci/announce_job_slack:
    call_workflow: notify
    context: slack_colors
    with:
      - notify: $?ctx.hdci.slack_notify
      - notify+: $?ctx.merged_hdci_cfg.slack_notify,ctx.hdci_cfg.slack_notify
        update: true
        attachments+:
          - color: $ctx.chat_colors.normal,""
            text: 'Step: {{ .ctx.job_name }} running'

  hdci/report_job_result_slack:
    call_workflow: notify
    context: slack_colors
    with:
      - notify: $?ctx.hdci.slack_notify
      - job_result_attachment:
          - color: $ctx.chat_colors.{{ coalesce .ctx.job_status .labels.status }},""
            text: |
              {{ .ctx.job_headline }}: {{ coalesce .ctx.job_status .labels.status }}
              {{- with default .labels.status .ctx.job_error }}
              Error:
              ```
              {{ . }}
              ```
              {{- end -}}
              {{- with .ctx.job_output }}
              Output:
              ```
              {{ . }}
              ```
              {{- end -}}
      - notify+: $?ctx.merged_hdci_cfg.slack_notify,ctx.hdci_cfg.slack_notify
        update: true
        attachments+: $ctx.job_result_attachment
    export:
      attachments+: $ctx.job_result_attachment

  hdci/announce_stage_slack:
    call_workflow: notify
    context: slack_colors
    with:
      - notify: $?ctx.hdci.slack_notify
      - notify+: $?ctx.merged_hdci_cfg.slack_notify,ctx.hdci_cfg.slack_notify
        attachments:
          - color: $ctx.chat_colors.normal,""
            text: '*Running stage: {{ .ctx.stage_name }}*'
    export:
      attachments: $ctx.attachments

  hdci/report_stage_result_slack:
    call_workflow: notify
    context: slack_colors
    with:
      - notify: $?ctx.hdci.slack_notify
      - notify+: $?ctx.merged_hdci_cfg.slack_notify,ctx.hdci_cfg.slack_notify
        update: true
        attachments+:
          - color: $ctx.chat_colors.{{ coalesce .ctx.job_status .labels.status }},""
            text: |
              *Stage: {{ .ctx.stage_name }} {{ coalesce .ctx.job_status .labels.status }}*
              {{- with .labels.reason }}
              reason:
              ```
              {{ . }}
              ```
              {{ end -}}
    export:
      attachments*: $ctx.attachments
