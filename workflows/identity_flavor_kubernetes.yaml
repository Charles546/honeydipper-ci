---
workflows:
  # requires:
  #   - git_repo
  #   - k8s_system (context default provided in contexts.yaml)
  # exports:
  #   - k8s_service_account_name
  hdci/create_identity_kubernetes:
    no_export:
      - "*"
    with:
      - k8s_service_account_name: '{{ with .ctx.git_repo }}sa-{{ . | replace "/" "-" | lower }}{{ end }}'
      - k8s_daemon_service_account: $ctx.worker_profile.k8s_daemon_service_account,ctx.hdci.workers.{{ .ctx.hdci.worker_default }}.k8s_daemon_service_account,"hdci-daemon"
      - k8s_vault_auth_path: $ctx.worker_profile.k8s_vault_auth_path,ctx.hdci.workers.{{ .ctx.hdci.worker_default }}.k8s_vault_auth_path,"kubernetes"
      - sa_job:
          apiVersion: batch/v1
          kind: Job
          metadata:
            generateName: 'hdci-sa-bootstrap-{{ with .ctx.git_repo }}{{ . | replace "/" "-" | lower }}{{ else }}default{{ end }}-'
          spec:
            backoffLimit: 1
            template:
              spec:
                restartPolicy: Never
                serviceAccountName: $ctx.k8s_daemon_service_account
                initContainers:
                  - name: create-service-account
                    image: docker.io/bitnami/kubectl:latest
                    command:
                      - /bin/sh
                      - -ec
                    args:
                      - |
                        sa_name='{{ .ctx.k8s_service_account_name }}'
                        ns="${HD_NAMESPACE:-default}"
                        if ! kubectl -n "$ns" get sa "$sa_name" >/dev/null 2>&1; then
                          kubectl -n "$ns" create sa "$sa_name"
                          kubectl -n "$ns" annotate sa "$sa_name" "vault.hashicorp.com/alias-metadata-repo=gh/{{ .ctx.git_repo }}"
                        fi
                        echo "service account ready: $sa_name"
                    env:
                      - name: HD_NAMESPACE
                        value: '{{ default "default" .ctx.hdci.k8s_namespace }}'
                containers:
                  - name: register-vault-role
                    image: hashicorp/vault:latest
                    command:
                      - /bin/sh
                      - -ec
                    args:
                      - |
                        sa_name='{{ .ctx.k8s_service_account_name }}'
                        ns="${HD_NAMESPACE:-default}"
                        SA_JWT="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
                        VAULT_TOKEN="$(vault write -field=token \
                          auth/${HD_VAULT_AUTH_PATH}/login \
                          role="${HD_VAULT_DAEMON_ROLE}" jwt="$SA_JWT")"
                        export VAULT_TOKEN

                        vault write auth/${HD_VAULT_AUTH_PATH}/role/"${sa_name}" \
                          bound_service_account_names="${sa_name}" \
                          bound_service_account_namespaces="${ns}" \
                          alias_name_source=serviceaccount_name \
                          policies="hdci-per-repo" \
                          ttl=20m max_ttl=30m
                        echo "vault kubernetes auth role ready: $sa_name"
                    env:
                      - name: HD_NAMESPACE
                        value: '{{ default "default" .ctx.hdci.k8s_namespace }}'
                      - name: VAULT_ADDR
                        value: '{{ dig "VAULT_ADDR" "" .ctx.hdci.worker.identity.env }}'
                      - name: HD_VAULT_AUTH_PATH
                        value: $ctx.k8s_vault_auth_path
                      - name: HD_VAULT_DAEMON_ROLE
                        value: $ctx.k8s_daemon_service_account
                    volumeMounts:
                      - name: kubernetes-identity
                        mountPath: /var/run/secrets/kubernetes.io/serviceaccount
                        readOnly: true
                volumes:
                  - name: kubernetes-identity
                    projected:
                      sources:
                        - serviceAccountToken:
                            path: token
                            expirationSeconds: 3600
                            audience: vault
                        - configMap:
                            name: kube-root-ca.crt
                            items:
                              - key: ca.crt
                                path: ca.crt
    steps:
      - call_function: '{{ .ctx.k8s_system }}.createJob'
        with:
          job: $ctx.sa_job
      - call_function: '{{ .ctx.k8s_system }}.waitForJob'
        with:
          retry: 2
        export:
          sa_job_status: $ctx.job_status
      - call_function: '{{ .ctx.k8s_system }}.getJobLog'
        export:
          sa_job_log: $ctx.output
      - call_function: '{{ .ctx.k8s_system }}.deleteJob'
        with:
          retry: 2
