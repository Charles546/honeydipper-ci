---
workflows:
  hdci/run_script_podman:
    no_export:
      - pod_cache_volumes
      - all_cache_volumes
    with:
      pod_cache_volumes: $?nil
    steps:
      - iterate: $?ctx.script.cache
        no_export:
          - podman_volume_name
        steps:
          - with:
              podman_system-: podman
              podman_volume_ignore_if_exists: true
              podman_volume_name: '{{ dig .ctx.current "" .ctx.hdci_cfg.cache }}'
            if:
              - $?ctx.podman_volume_name
            call_function: '{{ .ctx.podman_system }}.create_volume'
            export_on_success:
              pod_cache_volumes+:
                - name: $ctx.podman_volume_name
                  dest: $ctx.current
        description: ensure cache volumes exist for the pod
        export_on_success:
          all_cache_volumes: $?ctx.pod_cache_volumes
        export:
          script_status: '{{ empty .ctx.podman_error | and (eq .labels.status "success") | ternary "success" "error" }}'
          script_error: $?ctx.podman_error,labels.reason
        export_on_error:
          script_status: '{{ empty .ctx.podman_error | and (eq .labels.status "success") | ternary "success" "error" }}'
          script_error: $?ctx.podman_error,labels.reason
      - with:
          - script_steps: |
              {{ $st := list }}{{ if (toString .ctx.script.skip_steps | eq "*" | not) }}
              {{ $skip_list := (default (list) .ctx.script.skip_steps ) }}
              {{ range .ctx.hdci_cfg.default_script_steps }}{{ if (has . $skip_list | not) }}{{ $st = append $st . }}{{ end }}{{ end }}
              {{ end }}{{ return $st }}
          - script_steps+: $ctx.script.steps
        iterate: $ctx.script_steps
        call_workflow: hdci/podman_add_container
        description: adding containers
        export_on_error:
          script_status: $labels.status
          script_error: $labels.reason
      - call_workflow: run_podman
        with:
          - podman_on_start: hdci/announce_script
            # podman_delete_on_success: true
            podman_pod_spec:
              volumes: $?ctx.script.volumes
              env: $?ctx.script.env
            podman_use_work_volume: $ctx.podman_volume_name
            podman_work_volume_mount_point: $ctx.hdci.worker.work_dir,"/local/honeydipper"
          - podman_pod_spec:
              volumes+: $?ctx.pod_cache_volumes
        export:
          script_log: $?ctx.podman_pod_log
          script_status: '{{ empty .ctx.podman_error | and (eq .labels.status "success") | ternary "success" "error" }}'
          script_error: $?ctx.podman_error,labels.reason
        export_on_error:
          script_log: $?ctx.podman_pod_log
          script_status: '{{ empty .ctx.podman_error | and (eq .labels.status "success") | ternary "success" "error" }}'
          script_error: $?ctx.podman_error,labels.reason

  hdci/prepare_stage_storage_podman:
    with:
      podman_system-: podman
    call_function: '{{ .ctx.podman_system }}.create_volume'

  hdci/cleanup_stage_storage_podman:
    with:
      podman_system-: podman
    if_match:
      step_status: success
    call_function: '{{ .ctx.podman_system }}.delete_volume'

  hdci/podman_add_container:
    no_export:
      - expanded
      - cache_volumes
      - podman_volume_name
    with:
        - cfg: $?ctx.hdci_cfg.scripts.{{ .ctx.current }},ctx.current
        - cache_volumes: $?nil
    steps:
      - with:
          - step_executors: |
              {{ $ex := list }}{{ if (toString .ctx.cfg.skip_executors | eq "*" | not) }}
              {{ $skip_list := (default (list) .ctx.cfg.skip_executors) }}
              {{ range .ctx.hdci_cfg.default_executors }}{{ if (has . $skip_list | not) }}{{ $ex = append $ex . }}{{ end }}{{ end }}
              {{ end }}{{ return $ex }}
          - step_executors+: '{{ with .ctx.cfg.executor }}{{ if typeIs "string" . }}{{ list . | return }}{{ else }}{{ return . }}{{ end }}{{ else }}{{ return (list) }}{{ end }}'
        iterate: $ctx.step_executors
        steps:
          - export:
              expanded: $?ctx.hdci_cfg.executors.{{ .ctx.current }}
        description: expand container with executor
      - export:
          expanded: $ctx.cfg
        description: final merging container cfg
      - if:
          - $?ctx.expanded.script_file
        call_workflow: github_getContent
        with:
          github_system: $?ctx.gh_system
          path: $?ctx.expanded.script_file
        export_on_success:
          expanded:
            run: $ctx.file_content
        description: fetch remote script file
      - iterate: $?ctx.expanded.cache
        steps:
          - with:
              podman_system-: podman
              podman_volume_ignore_if_exists: true
              podman_volume_name: '{{ dig .ctx.current "" .ctx.hdci_cfg.cache }}'
            if:
              - $?ctx.podman_volume_name
            unless_match:
              all_cache_volumes:
                name: $?ctx.podman_volume_name
            call_function: '{{ .ctx.podman_system }}.create_volume'
            export:
              all_cache_volumes+:
                - name: $ctx.podman_volume_name
                  dest: $ctx.current
          - with:
              name: '{{ dig .ctx.current "" .ctx.hdci_cfg.cache }}'
            if:
              - $?ctx.name
            export:
              cache_volumes+:
                - name: $?ctx.name
                  dest: $ctx.current
            descripotion: add to container cache volume
        description: ensure cache volumes exist
      - with:
          - current_container:
              name: $?ctx.expanded.container_name
              image: $ctx.expanded.image
              entrypoint: $?ctx.expanded.entrypoint_
              command: $?ctx.expanded.command_
              volumes: $?ctx.expanded.volumes_
              env: $?ctx.expanded.env
              work_dir: $ctx.expanded.work_dir,ctx.hdci.worker.work_dir,"/local/honeydipper"
            run: $?ctx.expanded.run_
          - current_container:
              entrypoint+: $?ctx.expanded.entrypoint
              command+: $?ctx.expanded.command
              volumes+: $?ctx.expanded.volumes
            run+: $?ctx.expanded.run
          - current_container:
              command+: '{{ with .ctx.run }}{{ list . | return }}{{ end }}'
              volumes+: $?ctx.cache_volumes                
        export:
          podman_containers+:
            - $ctx.current_container
        description: build container spec
