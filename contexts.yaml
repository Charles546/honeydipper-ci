---
contexts:
  _hdci:
    hdci/run_script:
      hdci:
        script_flavor-: podman
    "*":
      hdci:
        vcs_flavor-: gh
        chat_flavor-: slack
        chat_system-: slack_bot
        worker_default-: podman_default
        workers:
          podman_default:
            script_flavor: podman
            identity_flavor: vault
            podman_system: podman
          kubernetes_default:
            script_flavor: kubernetes
            identity_flavor: kubernetes
            k8s_system: kubernetes
            k8s_storage_size: 5Gi
            k8s_daemon_service_account: hdci-daemon
            k8s_vault_auth_path: kubernetes
        notify_in_chat: true
        gh_system_pat: github_pat
        ui_url: http://127.0.0.1:5173 # placeholder for ui url, can be used in workflows to construct links to ui
        # slack_notify:
        #   - "#test"
        notify_steps: true
        worker:
          identity:
            sec_driver: /opt/honeydipper/drivers/builtin/hd-driver-vault
            sec_driver_image: docker.io/charleshoney/honeydipper:4.0.0-alpha2-3-ge04b038
            env:
              SECRET_PREFIX_1_REPO: 'secrets/data/hdci/gh/{{ .ctx.git_repo }}#'
              SECRET_PREFIX_2_ORG: 'secrets/data/hdci/gh/{{ with .ctx.git_repo }}{{ dir . }}{{ end }}/_org#'
              HD_SECURE_LOADER: '/local/honeydipper/hd-driver-vault'
        # worker:
        #   gh:
        #     env:
        #       GH_APP_PRIVATE_KEY: hd-lookup:/secrets/data/blah/daemon#github_app_ssh_key
        #       GH_APP_ID: 'blah'
        #       GH_APP_INSTALLATION_ID: 'blah'
        #   identity:
        #     sec_driver: /opt/honeydipper/drivers/builtin/hd-driver-vault
        #     sec_driver_image: docker.io/charleshoney/honeydipper:4.0.0-rc-5a7105f-podman
        #     env:
        #       VAULT_ADDR: http://blah:8200
        #       VAULT_ROLE_ID: hd-secret-file://identity/role_id
        #       VAULT_SECRET_ID: hd-secret-file://identity/secret_id
        #       HD_SECURE_LOADER: '/local/honeydipper/hd-driver-vault'
        #     volumes:
        #       - name: hd-test-identity
        #         dest: /var/hd-secrets/identity
    
    hdci/run_script_podman: &podman_system
      podman_system: $ctx.worker_profile.podman_system,ctx.hdci.workers.{{ .ctx.hdci.worker_default }}.podman_system,"podman"
    hdci/prepare_stage_volume_podman: *podman_system
    hdci/cleanup_stage_volume_podman: *podman_system

    hdci/run_script_kubernetes: &k8s_system
      k8s_system: $ctx.worker_profile.k8s_system,ctx.hdci.workers.{{ .ctx.hdci.worker_default }}.k8s_system,"kubernetes"
    hdci/prepare_stage_storage_kubernetes: *k8s_system
    hdci/cleanup_stage_storage_kubernetes: *k8s_system
    hdci/create_identity_kubernetes: *k8s_system

  _hdci_schema:
    '*':
      hdci_file_schema: '@:resources/hdci_file.cue'
      hdci_schema: '@:resources/hdci.cue'
      per_repo_identity_volume_name: 'hd-worker-identity-gh-{{ replace "/" "-" .ctx.git_repo }}'

  _hdci_builtin_cfg:
    '*':
      hdci_builtin_cfg:
        executors:
          with_secret_driver**: &with_secret_driver
            entrypoint_:
              - '{{ coalesce .ctx.hdci.worker.work_dir "/local/honeydipper" }}/docker-entrypoint.sh'
            env_: '{{ merge (default (dict) .ctx.hdci.worker.identity.env | deepCopy) (default (dict) .ctx.worker_profile.identity.runner.env | deepCopy) | return }}'
            volumes_: $?ctx.worker_profile.identity.runner.volumes

        scripts:
          load_secret_driver**:
            entrypoint_: ['/bin/sh', '-c']
            env_:
              SEC_DRIVER: $ctx.hdci.worker.identity.sec_driver
              WORK_DIR: $ctx.hdci.worker.work_dir,"/local/honeydipper"
            image: $ctx.hdci.worker.identity.sec_driver_image
            run_: >-
              cp  $SEC_DRIVER $(dirname $SEC_DRIVER)/docker-entrypoint.sh $(dirname $SEC_DRIVER)/web "$WORK_DIR" && echo sec driver copied.
            run: ""
            skip_executors: "*"

          github_checkout**:
            command:
              - /bin/sh
              - -c
            entrypoint_:
              - '{{ coalesce .ctx.hdci.worker.work_dir "/local/honeydipper" }}/docker-entrypoint.sh'
              - '/entrypoint.sh'
            env_: '{{ merge (default (dict) .ctx.hdci.worker.identity.env | deepCopy) (default (dict) .ctx.worker_profile.identity.runner.env | deepCopy) | return }}'
            env: $ctx.hdci.worker.gh.env
            image: 'docker.io/serversideup/github-cli:alpine'
            run_: |+
              set -e
              git config --global credential."https://github.com/".helper "!gh app-auth git-credential"
              GH_TOKEN="$(./web cli token github)" git clone https://github.com/"${GITHUB_REPO:-{{ .ctx.git_repo -}} }.git" \
                --branch "${GITHUB_BRANCH:-{{ toString .ctx.git_ref | trimPrefix "refs/heads/" -}} }" app
              exit
            skip_executors: "*"
            volumes: $?ctx.worker_profile.identity.setup.volumes
