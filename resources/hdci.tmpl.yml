---
executors:
  sh-c:
    command_++:
      - /bin/sh
      - -c

  gh:
    entrypoint_++:
      - '/entrypoint.sh'
    image: 'docker.io/serversideup/github-cli:alpine'
    run_: |+

      git config --global credential."https://github.com/".helper "!gh app-auth git-credential"

  run_in_repo:
    run_++: |+
    
      cd app

default_executors:
  - with_secret_driver
  - sh-c
  - run_in_repo

default_script_steps:
  - load_secret_driver
  - github_checkout
