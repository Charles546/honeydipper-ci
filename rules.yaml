---
rules:
  - when:
      source:
        system: github_hdci
        trigger: hit
      if_match:
        headers:
          X-Github-Event:
            - installation
        json:
          action:
            - created
      export:
        gh_event: $event.headers.X-Github-Event.0
        gh_action: $?event.json.action
        gh_installation_id: '{{ with dig "installation" "id" "" .event.json }}{{ int64 . }}{{ end }}'
        gh_installation_account: $?event.json.installation.account.login
        gh_installation_account_type: $?event.json.installation.account.type
        gh_sender: $?event.json.sender.login
        _meta_event: >-
          {{ index .event.headers "X-Github-Event" 0 }}
          {{ with dig "installation" "id" "" .event.json }}{{ int64 . | toString }}{{ end }}
          {{ default "" .event.json.installation.account.login }}
          {{ with .event.json.action }}{{ . }}{{ end }}
    do:
      contexts:
        - mute
        - _hdci
      if:
        - '{{ .ctx.gh_installation_account }}'
      call_workflow: hdci/gh_app_installation_onboarding
      description: Onboard GitHub App installation into hd-home auth allowlists

  - when:
      source:
        system: github_hdci
        trigger: hit
      if_match:
        headers:
          X-Github-Event:
            - installation
        json:
          action:
            - deleted
      export:
        gh_event: $event.headers.X-Github-Event.0
        gh_action: $?event.json.action
        gh_installation_id: '{{ with dig "installation" "id" "" .event.json }}{{ int64 . }}{{ end }}'
        gh_installation_account: $?event.json.installation.account.login
        gh_installation_account_type: $?event.json.installation.account.type
        gh_sender: $?event.json.sender.login
        _meta_event: >-
          {{ index .event.headers "X-Github-Event" 0 }}
          {{ with dig "installation" "id" "" .event.json }}{{ int64 . | toString }}{{ end }}
          {{ default "" .event.json.installation.account.login }}
          {{ with .event.json.action }}{{ . }}{{ end }}
    do:
      contexts:
        - mute
        - _hdci
      if:
        - '{{ .ctx.gh_installation_account }}'
      call_workflow: hdci/gh_app_installation_offboarding
      description: Offboard GitHub App installation from hd-home auth allowlists

  - when:
      source:
        system: github_hdci
        trigger: hit
      if_match:
        event:
          json:
            repository:
              ":present:":
                - full_name
      export:
        git_repo: $?event.json.repository.full_name
        git_ref: $?event.json.ref
        git_commit: $event.json.head_commit.id,event.json.commit.sha,event.json.pull_request.head.sha,""
        git_branches: $?event.json.branches
        gh_event: $event.headers.X-Github-Event.0
        gh_action: $?event.json.action
        gh_issue: $?event.json.number
        gh_status_context: $?event.json.context
        gh_state: $?event.json.state
        gh_installation_id: '{{ with dig "installation" "id" "" .event.json }}{{ int64 . }}{{ end }}'
        _meta_event: >-
          {{ index .event.headers "X-Github-Event" 0 }}
          {{ .event.json.repository.full_name }}
          {{ with coalesce (dig "head_commit" "id" "" .event.json) (dig "commit" "sha" "" .event.json) }}{{ . | trunc 7 | coalesce $.event.json.ref }}{{ end }}
          {{ with coalesce .event.json.action .event.json.state }}{{ . }}{{ end }}
          {{ with .event.json.number }}#{{ . }}{{ end }}
          {{ with .event.json.context }}({{ . }}){{ end }}
    do:
      contexts:
        - mute
      unless:
        - '{{ empty .ctx.git_repo }}'
      unless_match:
        - gh_event: status
          gh_status_context: hdci/cfg
        - gh_event: status
          gh_state: pending
        - gh_event: check_suite
      call_workflow: hdci
      description: HDCI GH event entrance
      with:
        gh_system: github_hdci
        git_commit_short: '{{ default "" .ctx.git_commit | trunc 7 }}'
